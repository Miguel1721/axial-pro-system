services:
  # 🐘 SERVIDOR POSTGRESQL (PROTEGIDO, sin puerto expuesto)
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: axial_admin
      POSTGRES_PASSWORD: axial_password_123
      POSTGRES_DB: axial_clinic_db
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/database/schema.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - dokploy-network
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager

  # 📊 INTERFAZ GRÁFICA PGADMIN (solo para debug, opcional)
  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@axial.com
      PGADMIN_DEFAULT_PASSWORD: admin
    networks:
      - dokploy-network
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.pgadmin.rule=Host(`pgadmin.centro-salud.agentesia.cloud`)"
        - "traefik.http.routers.pgadmin.entrypoints=websecure"
        - "traefik.http.routers.pgadmin.tls.certresolver=letsencrypt"

  # 🔗 API BACKEND NODE.JS
  backend:
    image: axial-pro-system-backend
    environment:
      - NODE_ENV=production
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=axial_clinic_db
      - DB_USER=axial_admin
      - DB_PASSWORD=axial_password_123
      - JWT_SECRET=super_secret_jwt_key_for_axial_pro_clinic_2026
      - JWT_EXPIRES_IN=24h
      - PORT=3000
    depends_on:
      - db
    networks:
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.axial-backend.rule=Host(`api.centro-salud.agentesia.cloud`)"
      - "traefik.http.routers.axial-backend.entrypoints=websecure"
      - "traefik.http.routers.axial-backend.tls.certresolver=letsencrypt"
      - "traefik.http.services.axial-backend.loadbalancer.server.port=3000"

  # 🖥️ FRONTEND REACT (Nginx)
  frontend:
    image: axial-pro-system-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=https://api.centro-salud.agentesia.cloud
    depends_on:
      - backend
    networks:
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.axial-frontend.rule=Host(`centro-salud.agentesia.cloud`)"
      - "traefik.http.routers.axial-frontend.entrypoints=websecure"
      - "traefik.http.routers.axial-frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.axial-frontend.loadbalancer.server.port=80"

networks:
  dokploy-network:
    external: true

volumes:
  pgdata:
    name: axial_pgdata