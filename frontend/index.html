<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Meta tags para PWA -->
    <meta name="theme-color" content="#3b82f6" />
    <meta name="description" content="Axial Pro Clinic - Sistema de Gestión Clínica Premium" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Axial Pro" />

    <!-- Apple touch icon -->
    <link rel="apple-touch-icon" href="/pwa-apple-180x180.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />

    <!-- PWA Manifest (será inyectado automáticamente por vite-plugin-pwa) -->

    <title>Axial Pro Clinic - Gestión Médica Premium</title>

    <!-- Estilos para splash screen y carga -->
    <style>
      /* Splash screen - Mejorado para WCAG AA+ */
      #splash-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, #3b82f6 0%, #1e40af 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.5s ease-out;
      }

      #splash-screen.fade-out {
        opacity: 0;
        pointer-events: none;
      }

      .splash-logo {
        width: 120px;
        height: 120px;
        background: white;
        border-radius: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        animation: pulse 2s ease-in-out infinite;
      }

      .splash-logo::before {
        content: 'A';
        font-size: 60px;
        font-weight: bold;
        background: linear-gradient(135deg, #3b82f6 0%, #9333ea 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .splash-text {
        margin-top: 24px;
        color: white;
        font-size: 24px;
        font-weight: 600;
        letter-spacing: 1px;
      }

      .splash-spinner {
        margin-top: 32px;
        width: 40px;
        height: 40px;
        border: 3px solid rgba(255, 255, 255, 0.3);
        border-top-color: white;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      @keyframes pulse {
        0%, 100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.05);
        }
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* Prevenir scroll durante splash */
      body.splash-active {
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <!-- Splash Screen -->
    <div id="splash-screen">
      <div class="splash-logo"></div>
      <div class="splash-text">Axial Pro Clinic</div>
      <div class="splash-spinner"></div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
